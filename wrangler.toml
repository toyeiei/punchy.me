name = "cloudflare-short-link"
main = "src/index.ts"
compatibility_date = "2024-04-03"
assets = { directory = "./public" }

[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAACpO5kHNRhLAhQOH"

[[routes]]
pattern = "punchy.me"
custom_domain = true

[[kv_namespaces]]
binding = "SHORT_LINKS"
id = "e5c2bbb9a5f04d409e42350fc025ea2d"

[[d1_databases]]
binding = "LOKI_DB"
database_name = "loki-db"
database_id = "31b9372d-c1fe-4bcd-9d8c-fd654a235562"

[ai]
binding = "AI"
remote = true
